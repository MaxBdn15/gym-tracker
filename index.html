<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0d0d0d">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1f1f1f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0ee;
  --muted: #888;
  --accent: #c8f560;
  --accent-dim: rgba(200,245,96,0.12);
  --accent-text: #0d1a00;
  --done: #2a3d12;
  --done-text: #a8d854;
  --radius: 14px;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overscroll-behavior: none; }

.app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }

/* Header */
.header { padding: 56px 20px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.app-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.app-title span { color: var(--accent); }
.session-date { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--surface2); padding: 6px 10px; border-radius: 20px; }

/* Session tabs */
.session-bar { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; flex-shrink: 0; border-bottom: 1px solid var(--border); scrollbar-width: none; }
.session-bar::-webkit-scrollbar { display: none; }
.session-pill { font-family: var(--mono); font-size: 11px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); color: var(--muted); white-space: nowrap; cursor: pointer; background: transparent; flex-shrink: 0; transition: all 0.15s; }
.session-pill.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 500; }
.session-pill.new { border-style: dashed; }

/* Progress bar */
.progress-bar-wrap { padding: 10px 20px; flex-shrink: 0; }
.progress-track { height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }
.progress-label { display: flex; justify-content: space-between; margin-top: 5px; }
.progress-label span { font-family: var(--mono); font-size: 10px; color: var(--muted); }

/* Scroll area */
.scroll { flex: 1; overflow-y: auto; padding: 12px 20px 32px; scrollbar-width: none; }
.scroll::-webkit-scrollbar { display: none; }

/* Exercise card */
.exo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.exo-card.expanded { border-color: var(--border2); }
.exo-card.all-done { border-color: rgba(168,216,84,0.3); }

.exo-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
.exo-num { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 18px; flex-shrink: 0; }
.exo-info { flex: 1; min-width: 0; }
.exo-name { font-size: 14px; font-weight: 700; letter-spacing: -0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exo-sub { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
.exo-badge { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 20px; background: var(--surface2); color: var(--muted); flex-shrink: 0; }
.exo-badge.done { background: var(--done); color: var(--done-text); }
.chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.expanded .chevron { transform: rotate(90deg); }

/* Expanded body */
.exo-body { padding: 0 16px 16px; display: none; }
.expanded .exo-body { display: block; }

.exo-desc { font-size: 12px; color: var(--muted); line-height: 1.6; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 12px; }

/* Series buttons */
.series-label { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.series-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.serie-btn { flex: 1; min-width: 60px; padding: 12px 8px; border-radius: 10px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; text-align: center; transition: all 0.15s; }
.serie-btn:active { transform: scale(0.95); }
.serie-btn .s-num { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.serie-btn .s-kg { font-size: 15px; font-weight: 700; font-family: var(--mono); margin: 2px 0; }
.serie-btn .s-reps { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.serie-btn.done { background: var(--done); border-color: transparent; }
.serie-btn.done .s-kg, .serie-btn.done .s-num, .serie-btn.done .s-reps { color: var(--done-text); }

/* Weight control */
.weight-row { display: flex; align-items: center; gap: 8px; }
.weight-label { font-family: var(--mono); font-size: 10px; color: var(--muted); flex: 1; }
.weight-ctrl { display: flex; align-items: center; gap: 0; border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
.w-btn { width: 38px; height: 38px; background: var(--surface2); border: none; color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.w-btn:active { background: var(--border2); }
.w-val { font-family: var(--mono); font-size: 14px; font-weight: 500; min-width: 52px; text-align: center; color: var(--text); background: transparent; border: none; padding: 0 4px; }

/* Cardio / time exercises */
.time-display { font-family: var(--mono); font-size: 32px; font-weight: 500; color: var(--accent); text-align: center; padding: 16px 0; letter-spacing: 2px; }
.timer-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.timer-btn:active { transform: scale(0.97); }
.timer-btn.start { background: var(--accent); color: var(--accent-text); }
.timer-btn.pause { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.timer-btn.reset-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); margin-top: 6px; font-size: 12px; padding: 10px; }

/* Done banner */
.done-banner { text-align: center; padding: 24px; background: var(--done); border-radius: var(--radius); margin-top: 8px; }
.done-banner p { color: var(--done-text); font-weight: 700; font-size: 16px; }
.done-banner small { color: rgba(168,216,84,0.6); font-family: var(--mono); font-size: 11px; }

/* New session modal */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 430px; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.modal input[type=date] { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; color: var(--text); font-family: var(--mono); font-size: 14px; margin-bottom: 12px; }
.modal-actions { display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-family: var(--sans); font-size: 14px; font-weight: 700; cursor: pointer; }
.modal-btn.cancel { background: var(--surface2); color: var(--muted); }
.modal-btn.confirm { background: var(--accent); color: var(--accent-text); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">GYM<span>.</span></div>
      <div class="session-date" id="current-date-label">—</div>
    </div>
  </div>

  <div class="session-bar" id="session-bar"></div>

  <div class="progress-bar-wrap">
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label">
      <span id="progress-text">0 / 0 séries</span>
      <span id="progress-pct">0%</span>
    </div>
  </div>

  <div class="scroll" id="exo-list"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nouvelle séance</h3>
    <input type="date" id="new-date" />
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-btn confirm" onclick="confirmNewSession()">Créer</button>
    </div>
  </div>
</div>

<script>
const EXERCISES = [
  { id:1, name:"Presse à jambes", sets:3, reps:12, defaultKg:50, timeMode:false, desc:"Assis sur la machine, jambes fléchies. Poussez en expirant, revenez en contrôlant. Ne tournez pas les genoux, ne décollez pas les talons." },
  { id:2, name:"Flexion jambes allongée", sets:3, reps:10, defaultKg:23, timeMode:false, desc:"À plat ventre, pieds sous le rouleau. Fléchissez les genoux au max en expirant, revenez en contrôlant." },
  { id:3, name:"Crunch abdominaux machine", sets:3, duration:3, defaultKg:25, timeMode:true, desc:"⚠️ Siège : 4. Enroulez le buste en poussant les bras vers l'avant. Contractez les abdos en position finale. Attention bas du dos." },
  { id:4, name:"Tirage vertical poulie", sets:3, reps:10, defaultKg:35, timeMode:false, desc:"Barre en pronation, prise large. Tirez les coudes vers le sol jusqu'à toucher la poitrine. Épaules basses." },
  { id:5, name:"Développé assis", sets:3, reps:10, defaultKg:25, timeMode:false, desc:"Lombaires contre le dossier. Poussez les poignées vers l'avant en expirant. Coudes et mains à même hauteur." },
  { id:6, name:"Tirage horizontal dynamique", sets:3, reps:15, defaultKg:20, timeMode:false, desc:"Assis droit, serrez les omoplates en ramenant bras et buste. Dos droit, épaules basses." },
  { id:7, name:"Dead Bug", sets:1, duration:1, defaultKg:null, timeMode:true, desc:"Allongé sur le dos, bras vers le plafond, hanches à 90°. Baissez une jambe et le bras opposé simultanément. Alternez." },
  { id:8, name:"Course sur tapis", sets:1, duration:10, defaultKg:null, timeMode:true, isCardio:true, speed:"3.8 km/h", incline:7, desc:"Inclinaison 7%, vitesse 3.8 km/h. Imaginez pousser le tapis vers l'arrière." }
];

const KEY = "gymtracker_v3";
let db = {};
let currentSession = null;
let expanded = {};
let timers = {};

function load() {
  try { db = JSON.parse(localStorage.getItem(KEY) || "{}"); } catch(e) { db = {}; }
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e) {}
}

function today() {
  return new Date().toISOString().slice(0,10);
}

function formatDateLabel(d) {
  if (!d) return "—";
  const [y,m,day] = d.split("-");
  const months = ["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];
  return `${parseInt(day)} ${months[parseInt(m)-1]}`;
}

function initSession(key) {
  if (!db[key]) {
    db[key] = { date: key, weights: {}, done: {} };
    EXERCISES.forEach(e => {
      db[key].weights[e.id] = e.defaultKg;
      db[key].done[e.id] = [];
    });
    save();
  }
}

function renderSessionBar() {
  const bar = document.getElementById("session-bar");
  bar.innerHTML = "";
  const keys = Object.keys(db).sort().reverse();
  const t = today();
  if (!keys.includes(t)) {
    const pill = makePill(t, "Aujourd'hui");
    bar.appendChild(pill);
  }
  keys.forEach(k => {
    const label = k === t ? "Aujourd'hui" : formatDateLabel(k);
    bar.appendChild(makePill(k, label));
  });
  const addPill = document.createElement("button");
  addPill.className = "session-pill new";
  addPill.textContent = "+ Séance";
  addPill.onclick = openModal;
  bar.appendChild(addPill);
}

function makePill(key, label) {
  const btn = document.createElement("button");
  btn.className = "session-pill" + (key === currentSession ? " active" : "");
  btn.textContent = label;
  btn.onclick = () => { currentSession = key; renderAll(); };
  return btn;
}

function renderProgress() {
  const sess = db[currentSession];
  let total = 0, done = 0;
  EXERCISES.forEach(e => {
    if (!e.timeMode) {
      total += e.sets;
      done += Math.min((sess.done[e.id] || []).length, e.sets);
    }
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-text").textContent = `${done} / ${total} séries`;
  document.getElementById("progress-pct").textContent = pct + "%";
}

function renderDateLabel() {
  document.getElementById("current-date-label").textContent = formatDateLabel(currentSession);
}

function renderExos() {
  const sess = db[currentSession];
  const list = document.getElementById("exo-list");
  list.innerHTML = "";

  EXERCISES.forEach(exo => {
    const done = sess.done[exo.id] || [];
    const kg = sess.weights[exo.id];
    const isExpanded = !!expanded[exo.id];
    const allDone = !exo.timeMode && done.length >= exo.sets;

    const card = document.createElement("div");
    card.className = "exo-card" + (isExpanded ? " expanded" : "") + (allDone ? " all-done" : "");

    let subText = "";
    if (exo.timeMode) {
      subText = `${exo.sets} série${exo.sets>1?"s":""} · ${exo.duration} min${kg ? " · " + kg + " kg" : ""}`;
      if (exo.isCardio) subText = `${exo.speed} · incl. ${exo.incline}% · ${exo.duration} min`;
    } else {
      subText = `${exo.sets} séries · ${exo.reps} reps · ${kg} kg`;
    }

    const badgeLabel = allDone ? "✓ ok" : exo.timeMode ? "chrono" : `${done.length}/${exo.sets}`;

    card.innerHTML = `
      <div class="exo-header" onclick="toggleExo(${exo.id})">
        <div class="exo-num">${exo.id}</div>
        <div class="exo-info">
          <div class="exo-name">${exo.name}</div>
          <div class="exo-sub">${subText}</div>
        </div>
        <div class="exo-badge${allDone ? " done" : ""}">${badgeLabel}</div>
        <div class="chevron">▶</div>
      </div>
      <div class="exo-body" id="body-${exo.id}"></div>
    `;

    list.appendChild(card);

    if (isExpanded) {
      renderBody(exo, sess);
    }
  });

  const allDone = EXERCISES.filter(e => !e.timeMode).every(e => (sess.done[e.id]||[]).length >= e.sets);
  if (allDone) {
    const banner = document.createElement("div");
    banner.className = "done-banner";
    banner.innerHTML = `<p>Séance terminée !</p><small>Bien joué, Maxence</small>`;
    list.appendChild(banner);
  }
}

function renderBody(exo, sess) {
  const body = document.getElementById("body-" + exo.id);
  if (!body) return;
  const done = sess.done[exo.id] || [];
  const kg = sess.weights[exo.id];

  let html = `<div class="exo-desc">${exo.desc}</div>`;

  if (exo.timeMode) {
    const target = exo.duration * 60;
    const timer = timers[exo.id] || { elapsed: 0, running: false };
    const remaining = Math.max(0, target - timer.elapsed);
    const mm = String(Math.floor(remaining/60)).padStart(2,"0");
    const ss = String(remaining%60).padStart(2,"0");
    const isRunning = timer.running;
    const isDone = timer.elapsed >= target;
    html += `<div class="time-display" id="timer-display-${exo.id}">${isDone ? "✓ " : ""}${mm}:${ss}</div>`;
    if (!isDone) {
      html += `<button class="timer-btn ${isRunning ? "pause" : "start"}" onclick="toggleTimer(${exo.id}, ${target})">${isRunning ? "Pause" : "Démarrer"}</button>`;
    } else {
      html += `<button class="timer-btn start" style="opacity:0.5;pointer-events:none;">Terminé</button>`;
    }
    html += `<button class="timer-btn reset-btn" onclick="resetTimer(${exo.id})">Réinitialiser</button>`;
    if (kg !== null && kg !== undefined) {
      html += `<div class="weight-row" style="margin-top:12px;"><div class="weight-label">Charge</div>${weightCtrlHTML(exo.id, kg)}</div>`;
    }
  } else {
    html += `<div class="series-label">Appuie pour valider chaque série</div>`;
    html += `<div class="series-row">`;
    for (let i = 0; i < exo.sets; i++) {
      const isDone = done.includes(i);
      html += `<button class="serie-btn${isDone ? " done" : ""}" onclick="toggleSerie(${exo.id},${i})">
        <div class="s-num">Série ${i+1}</div>
        <div class="s-kg">${kg}</div>
        <div class="s-reps">${exo.reps} reps</div>
      </button>`;
    }
    html += `</div>`;
    html += `<div class="weight-row"><div class="weight-label">Charge (kg)</div>${weightCtrlHTML(exo.id, kg)}</div>`;
  }

  body.innerHTML = html;
}

function weightCtrlHTML(exoId, kg) {
  return `<div class="weight-ctrl">
    <button class="w-btn" onclick="changeWeight(${exoId},-2.5)">−</button>
    <div class="w-val" id="wval-${exoId}">${kg}</div>
    <button class="w-btn" onclick="changeWeight(${exoId},2.5)">+</button>
  </div>`;
}

function changeWeight(exoId, delta) {
  const sess = db[currentSession];
  const cur = sess.weights[exoId] || 0;
  const newVal = Math.max(0, Math.round((cur + delta) * 10) / 10);
  sess.weights[exoId] = newVal;
  save();
  const el = document.getElementById("wval-" + exoId);
  if (el) el.textContent = newVal;
  const exo = EXERCISES.find(e => e.id === exoId);
  document.querySelectorAll(`#body-${exoId} .s-kg`).forEach(el => el.textContent = newVal);
  renderExos();
  renderBody(exo, sess);
}

function toggleSerie(exoId, idx) {
  const sess = db[currentSession];
  const done = sess.done[exoId] || [];
  const i = done.indexOf(idx);
  if (i > -1) done.splice(i, 1); else done.push(idx);
  sess.done[exoId] = done;
  save();
  const exo = EXERCISES.find(e => e.id === exoId);
  renderBody(exo, sess);
  renderProgress();
  renderExos();
  renderBody(exo, sess);
}

function toggleExo(id) {
  expanded[id] = !expanded[id];
  renderExos();
  const exo = EXERCISES.find(e => e.id === id);
  if (expanded[id]) renderBody(exo, db[currentSession]);
}

function toggleTimer(exoId, target) {
  if (!timers[exoId]) timers[exoId] = { elapsed: 0, running: false, interval: null };
  const t = timers[exoId];
  if (t.running) {
    clearInterval(t.interval);
    t.running = false;
  } else {
    t.running = true;
    t.interval = setInterval(() => {
      t.elapsed++;
      updateTimerDisplay(exoId, target);
      if (t.elapsed >= target) {
        clearInterval(t.interval);
        t.running = false;
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
        renderExos();
        const exo = EXERCISES.find(e => e.id === exoId);
        renderBody(exo, db[currentSession]);
      }
    }, 1000);
  }
  renderExos();
  const exo = EXERCISES.find(e => e.id === exoId);
  renderBody(exo, db[currentSession]);
}

function updateTimerDisplay(exoId, target) {
  const t = timers[exoId];
  const remaining = Math.max(0, target - t.elapsed);
  const mm = String(Math.floor(remaining/60)).padStart(2,"0");
  const ss = String(remaining%60).padStart(2,"0");
  const el = document.getElementById("timer-display-" + exoId);
  if (el) el.textContent = `${mm}:${ss}`;
}

function resetTimer(exoId) {
  if (timers[exoId]) {
    clearInterval(timers[exoId].interval);
    timers[exoId] = { elapsed: 0, running: false, interval: null };
  }
  const exo = EXERCISES.find(e => e.id === exoId);
  renderBody(exo, db[currentSession]);
}

function openModal() {
  document.getElementById("new-date").value = today();
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal() {
  document.getElementById("modal-bg").classList.remove("open");
}
function confirmNewSession() {
  const d = document.getElementById("new-date").value;
  if (d) { initSession(d); currentSession = d; closeModal(); renderAll(); }
}

function renderAll() {
  initSession(currentSession);
  renderSessionBar();
  renderDateLabel();
  renderProgress();
  renderExos();
}

load();
const t = today();
if (Object.keys(db).length === 0) initSession(t);
currentSession = Object.keys(db).sort().reverse()[0] || t;
renderAll();

document.getElementById("modal-bg").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

if ('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('fetch', e => {});
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
