<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0d0d0d">
<title>Gym Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--surface:#161616;--surface2:#1f1f1f;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#f0f0ee;--muted:#888;--accent:#c8f560;--accent-text:#0d1a00;--done:#2a3d12;--done-text:#a8d854;--radius:14px;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;}
.header{padding:52px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.app-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.app-title span{color:var(--accent);}
.session-date{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--surface2);padding:6px 10px;border-radius:20px;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{flex:1;padding:7px;border-radius:8px;border:none;background:transparent;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;}
.nav-tab.active{background:var(--surface2);color:var(--text);}
.session-bar{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);scrollbar-width:none;}
.session-bar::-webkit-scrollbar{display:none;}
.session-pill{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border2);color:var(--muted);white-space:nowrap;cursor:pointer;background:transparent;flex-shrink:0;}
.session-pill.active{background:var(--accent);color:var(--accent-text);border-color:var(--accent);font-weight:500;}
.session-pill.new{border-style:dashed;}
.session-pill.finished{border-color:rgba(168,216,84,0.4);color:var(--done-text);}
.progress-bar-wrap{padding:8px 20px;flex-shrink:0;}
.progress-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s ease;}
.progress-label{display:flex;justify-content:space-between;margin-top:4px;}
.progress-label span{font-family:var(--mono);font-size:10px;color:var(--muted);}
.scroll{flex:1;overflow-y:auto;padding:12px 20px 32px;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}
.finish-bar{padding:12px 20px;flex-shrink:0;border-top:1px solid var(--border);}
.finish-btn{width:100%;padding:14px;border-radius:12px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}
.finish-btn.done-session{background:var(--done);border-color:transparent;color:var(--done-text);}
.exo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color 0.2s;}
.exo-card.expanded{border-color:var(--border2);}
.exo-card.all-done{border-color:rgba(168,216,84,0.3);}
.exo-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.exo-num{font-family:var(--mono);font-size:10px;color:var(--muted);width:18px;flex-shrink:0;}
.exo-info{flex:1;min-width:0;}
.exo-name{font-size:14px;font-weight:700;letter-spacing:-0.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.exo-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px;}
.exo-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);flex-shrink:0;}
.exo-badge.done{background:var(--done);color:var(--done-text);}
.chevron{color:var(--muted);font-size:10px;transition:transform 0.2s;flex-shrink:0;}
.expanded .chevron{transform:rotate(90deg);}
.exo-body{padding:0 16px 16px;display:none;}
.expanded .exo-body{display:block;}
.exo-desc{font-size:12px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:12px;}
.series-label{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px;}
.serie-card{border:1px solid var(--border2);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.serie-card.done{border-color:transparent;background:var(--done);}
.serie-top{display:flex;align-items:center;gap:10px;padding:10px 12px;}
.serie-name{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;}
.serie-card.done .serie-name{color:var(--done-text);}
.serie-reps-info{font-family:var(--mono);font-size:12px;color:var(--text);flex:1;}
.serie-card.done .serie-reps-info{color:var(--done-text);}
.serie-check-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;flex-shrink:0;}
.serie-card.done .serie-check-btn{background:rgba(168,216,84,0.2);border-color:transparent;color:var(--done-text);}
.serie-weight-row{display:flex;align-items:center;border-top:1px solid var(--border);}
.serie-card.done .serie-weight-row{border-top-color:rgba(168,216,84,0.2);}
.sw-btn{width:44px;height:36px;background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.serie-card.done .sw-btn{color:var(--done-text);}
.sw-val{font-family:var(--mono);font-size:13px;font-weight:500;flex:1;text-align:center;color:var(--text);}
.serie-card.done .sw-val{color:var(--done-text);}
.sw-unit{font-family:var(--mono);font-size:10px;color:var(--muted);padding-right:12px;}
.serie-card.done .sw-unit{color:var(--done-text);}
.time-display{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--accent);text-align:center;padding:16px 0;letter-spacing:2px;}
.timer-btn{width:100%;padding:14px;border-radius:10px;border:none;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}
.timer-btn.start{background:var(--accent);color:var(--accent-text);}
.timer-btn.pause{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.timer-btn.reset-btn{background:transparent;color:var(--muted);border:1px solid var(--border);margin-top:6px;font-size:12px;padding:10px;}
.weight-row{display:flex;align-items:center;gap:8px;margin-top:12px;}
.weight-label{font-family:var(--mono);font-size:10px;color:var(--muted);flex:1;}
.weight-ctrl{display:flex;align-items:center;border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
.w-btn{width:38px;height:38px;background:var(--surface2);border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.w-val{font-family:var(--mono);font-size:14px;font-weight:500;min-width:52px;text-align:center;color:var(--text);}
.prog-section{margin-bottom:24px;}
.prog-exo-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.prog-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.prog-row:last-child{border-bottom:none;}
.prog-date{font-family:var(--mono);font-size:11px;color:var(--muted);width:60px;flex-shrink:0;}
.prog-series{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
.prog-serie-pill{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:20px;background:var(--surface2);color:var(--muted);}
.prog-badge-up{font-family:var(--mono);font-size:10px;padding:3px 7px;border-radius:20px;background:var(--done);color:var(--done-text);}
.prog-empty{font-size:13px;color:var(--muted);text-align:center;padding:32px 0;}
.prog-status{font-family:var(--mono);font-size:10px;flex-shrink:0;color:var(--muted);}
.prog-status.finished{color:var(--done-text);}
.prog-status.partial{color:#f5a623;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:430px;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;}
.modal input[type=date]{width:100%;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:14px;margin-bottom:12px;}
.modal-actions{display:flex;gap:8px;}
.modal-btn{flex:1;padding:14px;border-radius:10px;border:none;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;}
.modal-btn.cancel{background:var(--surface2);color:var(--muted);}
.modal-btn.confirm{background:var(--accent);color:var(--accent-text);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">GYM<span>.</span></div>
      <div class="session-date" id="current-date-label">—</div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" id="tab-seance" onclick="switchView('seance')">Séance</button>
      <button class="nav-tab" id="tab-prog" onclick="switchView('progression')">Progression</button>
    </div>
  </div>
  <div id="view-seance" style="display:flex;flex-direction:column;flex:1;min-height:0;">
    <div class="session-bar" id="session-bar"></div>
    <div class="progress-bar-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-label">
        <span id="progress-text">0 / 0 séries</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>
    <div class="scroll" id="exo-list"></div>
    <div class="finish-bar">
      <button class="finish-btn" id="finish-btn" onclick="toggleFinish()">Terminer la séance</button>
    </div>
  </div>
  <div id="view-progression" style="display:none;flex:1;overflow-y:auto;padding:16px 20px 32px;">
    <div id="prog-content"></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nouvelle séance</h3>
    <input type="date" id="new-date"/>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Annuler</button>
      <button class="modal-btn confirm" onclick="confirmNewSession()">Créer</button>
    </div>
  </div>
</div>

<script>
const EXERCISES=[
  {id:1,name:"Presse à jambes",sets:3,reps:12,defaultKg:50,timeMode:false,desc:"Assis sur la machine, jambes fléchies. Poussez en expirant, revenez en contrôlant. Ne tournez pas les genoux, ne décollez pas les talons."},
  {id:2,name:"Flexion jambes allongée",sets:3,reps:10,defaultKg:23,timeMode:false,desc:"À plat ventre, pieds sous le rouleau. Fléchissez les genoux au max en expirant, revenez en contrôlant."},
  {id:3,name:"Crunch abdominaux machine",sets:3,duration:3,defaultKg:25,timeMode:true,desc:"⚠️ Siège : 4. Enroulez le buste en poussant les bras vers l'avant. Contractez les abdos en position finale. Attention bas du dos."},
  {id:4,name:"Tirage vertical poulie",sets:3,reps:10,defaultKg:35,timeMode:false,desc:"Barre en pronation, prise large. Tirez les coudes vers le sol jusqu'à toucher la poitrine. Épaules basses."},
  {id:5,name:"Développé assis",sets:3,reps:10,defaultKg:25,timeMode:false,desc:"Lombaires contre le dossier. Poussez les poignées vers l'avant en expirant. Coudes et mains à même hauteur."},
  {id:6,name:"Tirage horizontal dynamique",sets:3,reps:15,defaultKg:20,timeMode:false,desc:"Assis droit, serrez les omoplates en ramenant bras et buste. Dos droit, épaules basses."},
  {id:7,name:"Dead Bug",sets:1,duration:1,defaultKg:null,timeMode:true,desc:"Allongé sur le dos, bras vers le plafond, hanches à 90°. Baissez une jambe et le bras opposé simultanément. Alternez."},
  {id:8,name:"Course sur tapis",sets:1,duration:10,defaultKg:null,timeMode:true,isCardio:true,speed:"3.8 km/h",incline:7,desc:"Inclinaison 7%, vitesse 3.8 km/h. Imaginez pousser le tapis vers l'arrière."}
];
const KEY="gymtracker_v4";
let db={},currentSession=null,expanded={},timers={},currentView='seance';
function load(){try{db=JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){db={};}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(db));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10);}
function formatDateLabel(d){if(!d)return"—";const[y,m,day]=d.split("-");const months=["jan","fév","mar","avr","mai","jun","jul","aoû","sep","oct","nov","déc"];return`${parseInt(day)} ${months[parseInt(m)-1]}`;}

function initSession(key){
  if(!db[key]){
    db[key]={date:key,serieWeights:{},done:{},finished:false};
    EXERCISES.forEach(e=>{db[key].serieWeights[e.id]=Array.from({length:e.sets},()=>e.defaultKg);db[key].done[e.id]=[];});
    save();
  }
  const sess=db[key];
  if(!sess.serieWeights){
    sess.serieWeights={};
    EXERCISES.forEach(e=>{const old=sess.weights?(sess.weights[e.id]||e.defaultKg):e.defaultKg;sess.serieWeights[e.id]=Array.from({length:e.sets},()=>old);});
    delete sess.weights;save();
  }
  if(sess.finished===undefined)sess.finished=false;
}

function switchView(v){
  currentView=v;
  const sv=document.getElementById('view-seance');
  const pv=document.getElementById('view-progression');
  sv.style.display=v==='seance'?'flex':'none';
  pv.style.display=v==='progression'?'block':'none';
  document.getElementById('tab-seance').classList.toggle('active',v==='seance');
  document.getElementById('tab-prog').classList.toggle('active',v==='progression');
  if(v==='progression')renderProgression();
}

function renderSessionBar(){
  const bar=document.getElementById("session-bar");bar.innerHTML="";
  const keys=Object.keys(db).sort().reverse();const t=today();
  if(!keys.includes(t))bar.appendChild(makePill(t,"Aujourd'hui"));
  keys.forEach(k=>{const label=k===t?"Aujourd'hui":formatDateLabel(k);bar.appendChild(makePill(k,label));});
  const a=document.createElement("button");a.className="session-pill new";a.textContent="+ Séance";a.onclick=openModal;bar.appendChild(a);
}
function makePill(key,label){
  const btn=document.createElement("button");
  const isF=db[key]&&db[key].finished;
  btn.className="session-pill"+(key===currentSession?" active":"")+(isF&&key!==currentSession?" finished":"");
  btn.textContent=label+(isF?" ✓":"");btn.onclick=()=>{currentSession=key;renderAll();};return btn;
}

function renderProgress(){
  const sess=db[currentSession];let total=0,done=0;
  EXERCISES.forEach(e=>{if(!e.timeMode){total+=e.sets;done+=Math.min((sess.done[e.id]||[]).length,e.sets);}});
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById("progress-fill").style.width=pct+"%";
  document.getElementById("progress-text").textContent=`${done} / ${total} séries`;
  document.getElementById("progress-pct").textContent=pct+"%";
  const btn=document.getElementById("finish-btn");
  if(sess&&sess.finished){btn.textContent="Séance terminée ✓";btn.className="finish-btn done-session";}
  else{btn.textContent="Terminer la séance";btn.className="finish-btn";}
}

function toggleFinish(){const sess=db[currentSession];sess.finished=!sess.finished;save();renderProgress();renderSessionBar();}

function renderDateLabel(){document.getElementById("current-date-label").textContent=formatDateLabel(currentSession);}

function renderExos(){
  const sess=db[currentSession];const list=document.getElementById("exo-list");list.innerHTML="";
  EXERCISES.forEach(exo=>{
    const done=sess.done[exo.id]||[];
    const weights=sess.serieWeights[exo.id]||Array(exo.sets).fill(exo.defaultKg);
    const isExpanded=!!expanded[exo.id];
    const allDone=!exo.timeMode&&done.length>=exo.sets;
    let subText="";
    if(exo.timeMode){subText=exo.isCardio?`${exo.speed} · incl. ${exo.incline}% · ${exo.duration} min`:`${exo.sets}x ${exo.duration} min${weights[0]?" · "+weights[0]+" kg":""}`;}
    else{const kgList=[...new Set(weights.filter(w=>w!==null))];const kgStr=kgList.length===1?kgList[0]+" kg":kgList.join("/"+" kg ");subText=`${exo.sets} séries · ${exo.reps} reps · ${kgStr}`;}
    const badgeLabel=allDone?"✓ ok":exo.timeMode?"chrono":`${done.length}/${exo.sets}`;
    const card=document.createElement("div");
    card.className="exo-card"+(isExpanded?" expanded":"")+(allDone?" all-done":"");
    card.innerHTML=`<div class="exo-header" onclick="toggleExo(${exo.id})"><div class="exo-num">${exo.id}</div><div class="exo-info"><div class="exo-name">${exo.name}</div><div class="exo-sub">${subText}</div></div><div class="exo-badge${allDone?" done":""}">${badgeLabel}</div><div class="chevron">▶</div></div><div class="exo-body" id="body-${exo.id}"></div>`;
    list.appendChild(card);
    if(isExpanded)renderBody(exo,sess);
  });
}

function renderBody(exo,sess){
  const body=document.getElementById("body-"+exo.id);if(!body)return;
  const done=sess.done[exo.id]||[];
  const weights=sess.serieWeights[exo.id]||Array(exo.sets).fill(exo.defaultKg);
  let html=`<div class="exo-desc">${exo.desc}</div>`;
  if(exo.timeMode){
    const target=exo.duration*60;const timer=timers[exo.id]||{elapsed:0,running:false};
    const remaining=Math.max(0,target-timer.elapsed);
    const mm=String(Math.floor(remaining/60)).padStart(2,"0");const ss=String(remaining%60).padStart(2,"0");
    const isDone=timer.elapsed>=target;
    html+=`<div class="time-display" id="timer-display-${exo.id}">${isDone?"✓ ":""}${mm}:${ss}</div>`;
    if(!isDone)html+=`<button class="timer-btn ${timer.running?"pause":"start"}" onclick="toggleTimer(${exo.id},${target})">${timer.running?"Pause":"Démarrer"}</button>`;
    else html+=`<button class="timer-btn start" style="opacity:0.5;pointer-events:none;">Terminé</button>`;
    html+=`<button class="timer-btn reset-btn" onclick="resetTimer(${exo.id})">Réinitialiser</button>`;
    if(weights[0]!==null&&weights[0]!==undefined)html+=`<div class="weight-row"><div class="weight-label">Charge</div><div class="weight-ctrl"><button class="w-btn" onclick="changeSerieWeight(${exo.id},0,-2.5)">−</button><div class="w-val" id="sw-${exo.id}-0">${weights[0]}</div><button class="w-btn" onclick="changeSerieWeight(${exo.id},0,2.5)">+</button></div></div>`;
  } else {
    html+=`<div class="series-label">Ajuste le poids par série, puis valide</div>`;
    for(let i=0;i<exo.sets;i++){
      const isDone=done.includes(i);const kg=weights[i]!==undefined?weights[i]:exo.defaultKg;
      html+=`<div class="serie-card${isDone?" done":""}" id="sc-${exo.id}-${i}"><div class="serie-top"><div class="serie-name">S${i+1}</div><div class="serie-reps-info">${exo.reps} reps</div><button class="serie-check-btn" onclick="toggleSerie(${exo.id},${i})">${isDone?"✓ Fait":"Valider"}</button></div><div class="serie-weight-row"><button class="sw-btn" onclick="changeSerieWeight(${exo.id},${i},-2.5)">−</button><div class="sw-val" id="sw-${exo.id}-${i}">${kg}</div><div class="sw-unit">kg</div><button class="sw-btn" onclick="changeSerieWeight(${exo.id},${i},2.5)">+</button></div></div>`;
    }
  }
  body.innerHTML=html;
}

function changeSerieWeight(exoId,serieIdx,delta){
  const sess=db[currentSession];const exo=EXERCISES.find(e=>e.id===exoId);
  if(!sess.serieWeights[exoId])sess.serieWeights[exoId]=Array(exo.sets).fill(0);
  const cur=sess.serieWeights[exoId][serieIdx]||0;
  const newVal=Math.max(0,Math.round((cur+delta)*10)/10);
  sess.serieWeights[exoId][serieIdx]=newVal;save();
  const el=document.getElementById(`sw-${exoId}-${serieIdx}`);if(el)el.textContent=newVal;
  renderExos();if(expanded[exoId])renderBody(exo,sess);
}

function toggleSerie(exoId,idx){
  const sess=db[currentSession];const done=sess.done[exoId]||[];
  const i=done.indexOf(idx);if(i>-1)done.splice(i,1);else done.push(idx);
  sess.done[exoId]=done;save();renderProgress();renderExos();
  if(expanded[exoId])renderBody(EXERCISES.find(e=>e.id===exoId),sess);
}

function toggleExo(id){
  expanded[id]=!expanded[id];renderExos();
  if(expanded[id])renderBody(EXERCISES.find(e=>e.id===id),db[currentSession]);
}

function toggleTimer(exoId,target){
  if(!timers[exoId])timers[exoId]={elapsed:0,running:false,interval:null};
  const t=timers[exoId];
  if(t.running){clearInterval(t.interval);t.running=false;}
  else{t.running=true;t.interval=setInterval(()=>{t.elapsed++;updateTimerDisplay(exoId,target);if(t.elapsed>=target){clearInterval(t.interval);t.running=false;if(navigator.vibrate)navigator.vibrate([200,100,200]);renderExos();renderBody(EXERCISES.find(e=>e.id===exoId),db[currentSession]);}},1000);}
  renderExos();renderBody(EXERCISES.find(e=>e.id===exoId),db[currentSession]);
}
function updateTimerDisplay(exoId,target){
  const t=timers[exoId];const remaining=Math.max(0,target-t.elapsed);
  const mm=String(Math.floor(remaining/60)).padStart(2,"0");const ss=String(remaining%60).padStart(2,"0");
  const el=document.getElementById("timer-display-"+exoId);if(el)el.textContent=`${mm}:${ss}`;
}
function resetTimer(exoId){if(timers[exoId]){clearInterval(timers[exoId].interval);timers[exoId]={elapsed:0,running:false,interval:null};}renderBody(EXERCISES.find(e=>e.id===exoId),db[currentSession]);}

function renderProgression(){
  const cont=document.getElementById("prog-content");
  const keys=Object.keys(db).sort();
  if(keys.length===0){cont.innerHTML=`<div class="prog-empty">Aucune séance enregistrée.</div>`;return;}
  let html="";
  EXERCISES.filter(e=>!e.timeMode).forEach(exo=>{
    html+=`<div class="prog-section"><div class="prog-exo-title">${exo.name}</div>`;
    const rows=keys.map(k=>{const sess=db[k];if(!sess)return null;const weights=sess.serieWeights?sess.serieWeights[exo.id]:null;if(!weights)return null;return{date:k,weights,done:sess.done[exo.id]||[],finished:sess.finished};}).filter(Boolean);
    if(rows.length===0){html+=`<div style="font-size:12px;color:var(--muted);padding:8px 0;">Pas encore de données.</div>`;}
    else{
      [...rows].reverse().forEach((row,idx,arr)=>{
        const prevRow=arr[idx+1];
        const maxKg=Math.max(...row.weights.filter(w=>w!==null&&w!==undefined));
        const prevMax=prevRow?Math.max(...prevRow.weights.filter(w=>w!==null&&w!==undefined)):null;
        const improved=prevMax!==null&&maxKg>prevMax;
        const doneCount=row.done.length;
        const status=row.finished?"finished":doneCount>0?"partial":"";
        const statusLabel=row.finished?"✓":doneCount>0?`${doneCount}/${exo.sets}s`:"—";
        html+=`<div class="prog-row"><div class="prog-date">${formatDateLabel(row.date)}</div><div class="prog-series">`;
        row.weights.forEach((w,i)=>{const isDone=row.done.includes(i);html+=`<div class="prog-serie-pill" style="${isDone?"background:var(--done);color:var(--done-text);":""}">${w!==null&&w!==undefined?w:"—"}</div>`;});
        if(improved)html+=`<div class="prog-badge-up">+${(maxKg-prevMax).toFixed(1).replace('.0','')} kg</div>`;
        html+=`</div><div class="prog-status ${status}">${statusLabel}</div></div>`;
      });
    }
    html+=`</div>`;
  });
  cont.innerHTML=html;
}

function openModal(){document.getElementById("new-date").value=today();document.getElementById("modal-bg").classList.add("open");}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");}
function confirmNewSession(){const d=document.getElementById("new-date").value;if(d){initSession(d);currentSession=d;closeModal();renderAll();}}

function renderAll(){initSession(currentSession);renderSessionBar();renderDateLabel();renderProgress();renderExos();}

load();
const t=today();if(Object.keys(db).length===0)initSession(t);
currentSession=Object.keys(db).sort().reverse()[0]||t;
renderAll();
document.getElementById("modal-bg").addEventListener("click",function(e){if(e.target===this)closeModal();});
if('serviceWorker'in navigator){const sw=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{});`;const blob=new Blob([sw],{type:'application/javascript'});navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});}
</script>
